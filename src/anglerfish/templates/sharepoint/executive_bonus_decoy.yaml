name: Executive Bonus Workbook Set
description: Financial-looking documents placed in a sensitive SharePoint site.
type: sharepoint
site_name: Finance
folder_path: Executive/Confidential
filenames:
  - FY${fiscal_year}_Executive_Bonus_Allocations.txt
content_text: |
  CONFIDENTIAL - Internal Finance Draft

  Canary Document: ${filename}
  Owner: ${owner_name}
  Fiscal Year: ${fiscal_year}
  Program: Executive Bonus Allocation

  Unauthorized access or sharing of this document is monitored.
variables:
  - name: fiscal_year
    description: Fiscal year
    default: "2026"
  - name: owner_name
    description: Document owner
    default: VP Finance
