name: Board Meeting Minutes
description: Deceptive board meeting minutes document placed in a restricted SharePoint folder to detect unauthorized access
type: sharepoint

site_name: Executive
folder_path: Board/Minutes
filenames:
  - Board_Minutes_${quarter}.docx
content_text: |
  CONFIDENTIAL — BOARD OF DIRECTORS ONLY

  Canary Document: ${filename}
  Meeting: Board of Directors — Quarterly Review
  Quarter: ${quarter}

  This document contains confidential minutes from the Board of Directors
  quarterly meeting. Distribution is limited to board members and the
  corporate secretary. Unauthorized access or distribution is strictly
  prohibited and monitored.

  Agenda items, resolutions, and executive session notes are recorded herein.
  All attendees are reminded of their fiduciary obligations regarding the
  confidentiality of board proceedings.

variables:
  - name: quarter
    description: Board meeting quarter identifier
    default: Q1-2026
