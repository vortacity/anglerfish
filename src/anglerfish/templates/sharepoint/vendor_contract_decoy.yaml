name: Vendor Contract Renewal Pack
description: Procurement-themed contract files to detect unauthorized document access.
type: sharepoint
site_name: Procurement
folder_path: Procurement/Contracts
filenames:
  - Vendor_Renewal_Master_${month}.txt
content_text: |
  PROCUREMENT - Vendor Negotiation Working Copy

  Canary Document: ${filename}
  Month: ${month}
  Procurement Lead: ${procurement_lead}
  Contract Scope: ${contract_scope}

  This file contains monitored canary identifiers.
variables:
  - name: month
    description: Month label
    default: 2026-02
  - name: procurement_lead
    description: Procurement lead
    default: Strategic Sourcing
  - name: contract_scope
    description: Contract scope label
    default: Global Suppliers
