name: Executive Travel Itinerary
description: Fake travel itinerary with flight details and hotel bookings in a personal OneDrive folder
type: onedrive

folder_path: Travel/${year}
filenames:
  - ${exec_name}_Travel_Itinerary_${trip_date}.txt
content_text: |
  CONFIDENTIAL — EXECUTIVE TRAVEL OFFICE ONLY

  Canary Document: ${filename}
  Prepared by: Executive Travel Desk
  Year: ${year}
  Executive: ${exec_name}
  Trip Period: ${trip_date}

  This document contains confidential executive travel arrangements including
  flight details, hotel bookings, and ground transportation. Unauthorized
  access or distribution is strictly prohibited and monitored.

variables:
  - name: year
    description: Travel year
    default: "2026"
  - name: exec_name
    description: Executive name or title
    default: CEO
  - name: trip_date
    description: Trip date or quarter
    default: Q2
