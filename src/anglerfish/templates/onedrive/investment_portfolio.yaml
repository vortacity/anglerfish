name: Investment Portfolio
description: Fake investment portfolio spreadsheet in personal OneDrive to detect unauthorized file browsing
type: onedrive

folder_path: Financial/Investments
filenames:
  - Portfolio_Summary_${year}.xlsx
content_text: |
  Account	Type	Ticker	Shares	Cost Basis	Current Value	Gain/Loss
  BROKERAGE-001	Individual	VOO	250	85000	112500	27500
  BROKERAGE-001	Individual	QQQ	150	45000	58500	13500
  IRA-002	Traditional	BND	500	50000	48500	-1500
  IRA-002	Traditional	VTI	300	62000	78000	16000
  ROTH-003	Roth IRA	AAPL	100	15000	19500	4500
  CONFIDENTIAL — PERSONAL FINANCIAL DATA — ${year}
  Canary Document: ${filename} — Access is logged and monitored.

variables:
  - name: year
    description: Portfolio summary year
    default: "2026"
