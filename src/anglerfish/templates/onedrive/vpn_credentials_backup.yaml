name: VPN Credentials Backup
description: Fake VPN configuration file with credentials placed in personal OneDrive to detect snooping
type: onedrive

folder_path: IT/Backups
filenames:
  - VPN_Config_${vpn_provider}_Backup.txt
content_text: |
  CONFIDENTIAL — DO NOT SHARE

  Canary Document: ${filename}
  VPN Provider: ${vpn_provider}

  This file contains VPN configuration and credential backup data.
  It is stored for personal IT recovery purposes only.
  Unauthorized access or distribution is strictly prohibited and monitored.

variables:
  - name: vpn_provider
    description: VPN provider name
    default: GlobalProtect
