name: Performance Review Notes
description: Fake performance review document in personal OneDrive to detect unauthorized file browsing
type: onedrive

folder_path: HR/Reviews
filenames:
  - ${review_period}_Performance_Review_Notes.docx
content_text: |
  CONFIDENTIAL — MANAGER USE ONLY

  Canary Document: ${filename}
  Review Period: ${review_period}

  This document contains private performance review notes and calibration
  data for direct reports. It is intended solely for the manager's
  personal reference during the review cycle.

  Sharing, forwarding, or unauthorized access is strictly prohibited
  and monitored. Contact HR Business Partners with questions regarding
  the performance review process.

variables:
  - name: review_period
    description: Performance review period identifier
    default: 2026-H1
