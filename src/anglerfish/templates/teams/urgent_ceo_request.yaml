name: Urgent CEO Request
description: Canary posing as an urgent out-of-office request from a CEO or senior executive in Teams
type: teams

variables:
  - name: recipient_name
    description: Name of the message recipient
    default: Team
  - name: ceo_name
    description: Name of the executive sending the request
    default: Dana Sawyer
  - name: deadline
    description: Deadline for the requested action
    default: end of day today

subject: "[Urgent] Confidential Request from ${ceo_name} — Response Required"
body_html: |
  <html>
  <body>
  <p>Hi ${recipient_name},</p>
  <p>I need your help with something time-sensitive. I'm currently in back-to-back
  meetings and cannot take calls. Please handle this discreetly.</p>
  <p>I need you to pull the latest vendor invoice summary for our Q4 reconciliation.
  The finance team has the file reference — please coordinate with them and send me a
  consolidated summary by <strong>${deadline}</strong>.</p>
  <p>Keep this between us for now. I'll explain the full context once I'm out of meetings.
  Do not forward this message.</p>
  <p>— ${ceo_name}</p>
  </body>
  </html>
