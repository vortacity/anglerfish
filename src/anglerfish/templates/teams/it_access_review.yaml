name: IT Access Review Required
description: Canary posing as an IT security access review notification requiring immediate action in Teams
type: teams

variables:
  - name: target_name
    description: Display name of the message recipient
    default: User
  - name: review_id
    description: Access review ticket identifier
    default: AR-2026-0834
  - name: due_date
    description: Date by which the review must be completed
    default: within 24 hours

subject: "[IT Security] Access Review Required — ${review_id}"
body_html: |
  <html>
  <body>
  <p>Hi ${target_name},</p>
  <p>The IT Security team has flagged your account for a mandatory access review
  (<strong>${review_id}</strong>). This review must be completed <strong>${due_date}</strong>
  to avoid automatic suspension of your account access.</p>
  <p>This review covers:</p>
  <ul>
    <li>Privileged application access</li>
    <li>Shared mailbox permissions</li>
    <li>SharePoint site memberships</li>
    <li>Teams channel ownership</li>
  </ul>
  <p>Log in to the corporate IT portal and navigate to <strong>Identity &amp; Access &gt;
  My Access Reviews</strong>. Reference your ticket number <strong>${review_id}</strong>
  if you contact the helpdesk.</p>
  <p>If you have questions, reply to this message or contact the IT Security helpdesk.</p>
  <p><em>— IT Security Team</em></p>
  </body>
  </html>
