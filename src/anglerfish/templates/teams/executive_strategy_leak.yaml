name: Executive Strategy Leak
description: Canary resembling a leaked executive strategy discussion in Teams
type: teams

variables:
  - name: project_name
    description: Internal project codename
    default: Project Aurora
  - name: exec_name
    description: Executive name for the message
    default: Dana Sawyer

subject: "RE: ${project_name} — Q3 Acquisition Strategy (CONFIDENTIAL)"
body_html: |
  <html>
  <body>
  <p>Team,</p>
  <p>Following up on last week's board session — ${exec_name} has approved moving forward
  with the ${project_name} acquisition timeline. The target valuation is in the range we
  discussed, and legal is preparing the LOI.</p>
  <p><strong>Key dates:</strong></p>
  <ul>
    <li>LOI delivery: end of next week</li>
    <li>Due diligence window: 45 days from signing</li>
    <li>Board vote on final terms: Q3 close</li>
  </ul>
  <p>Please keep this within the exec team until we are ready to brief wider leadership.
  Any questions, reach out to ${exec_name} directly.</p>
  <p>Thanks,<br/>Strategy &amp; Corp Dev</p>
  </body>
  </html>
