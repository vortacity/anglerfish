name: Payroll Direct Deposit Update
description: Hidden email posing as an HR payroll notification about a direct deposit account change
type: outlook

variables:
  - name: target_name
    description: Display name of the target user
    default: Employee
  - name: employee_id
    description: Employee ID number
    default: EMP-00419
  - name: bank_last4
    description: Last four digits of the bank account on file
    default: 7823

folder_name: HR - Payroll
subject: "[HR Payroll] Direct Deposit Account Update — Confirmation Required"
sender_name: Payroll Services
sender_email: payroll@contoso.com
body_html: |
  <html>
  <body>
  <p>Dear ${target_name},</p>
  <p>We have received a request to update the direct deposit bank account associated with
  your employee record (<strong>${employee_id}</strong>).</p>
  <p>The account on file ending in <strong>${bank_last4}</strong> will be replaced within
  2 business days unless you cancel this request.</p>
  <p>If you did <strong>not</strong> authorize this change, contact Payroll Services
  immediately at payroll@contoso.com or call HR at extension 4400. Reference your
  employee ID (<strong>${employee_id}</strong>) when you call.</p>
  <p>If you did authorize this change, no action is required.</p>
  <p><em>— Payroll Services, Human Resources</em></p>
  </body>
  </html>
