name: Fake Wire Transfer
description: Hidden email containing fake wire transfer banking details
type: outlook

variables:
  - name: sender_name
    description: Display name for the sender (e.g. "Dana Sawyer (CFO)")
    default: Dana Sawyer (CFO)
  - name: sender_email
    description: Sender email address
    default: dana.sawyer@contoso.com
  - name: canary_account
    description: Canary bank account number to embed in the wire transfer

folder_name: Finance - Confidential
subject: "Wire Transfer Instructions - Q4 Vendor Payment"
sender_name: ${sender_name}
sender_email: ${sender_email}
body_html: |
  <html>
  <body>
  <p>Please process the following wire transfer by end of day:</p>
  <ul>
    <li>Beneficiary: Fabrikam Consulting LLC</li>
    <li>Account: ${canary_account}</li>
    <li>Amount: $47,500.00</li>
  </ul>
  </body>
  </html>
