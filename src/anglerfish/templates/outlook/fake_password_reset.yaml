name: Fake Password Reset
description: Hidden email posing as an IT password expiration notice
type: outlook

variables:
  - name: target_name
    description: Display name of the target user
    default: User

folder_name: IT Notifications
subject: "[Action Required] Password Expiration Notice"
sender_name: IT Service Desk
sender_email: it-support@contoso.com
body_html: |
  <html>
  <body>
  <p>Dear ${target_name},</p>
  <p>Your corporate password will expire in <strong>24 hours</strong>.</p>
  <p>To reset your password, call the IT Service Desk at extension 5800 or submit a
  ticket in ServiceNow under <strong>Account Services &gt; Password Reset</strong>.</p>
  <p>If you have already reset your password recently, no further action is required.
  Contact the IT Service Desk if you need assistance.</p>
  <p><em>— IT Service Desk</em></p>
  </body>
  </html>
